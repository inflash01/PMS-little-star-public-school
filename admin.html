<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Little Star Public School</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        header {
            background: linear-gradient(135deg, #0D47A1 0%, #1976D2 100%);
            padding: 30px;
            border-radius: 20px;
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }
        
        header h1 { font-family: 'Fredoka One', cursive; font-size: 36px; margin-bottom: 10px; }
        header p { opacity: 0.9; }
        
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 { font-size: 40px; color: #0D47A1; font-family: 'Fredoka One', cursive; }
        .stat-card p { color: #546E7A; font-weight: 700; text-transform: uppercase; }
        
        .admissions-section { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .admissions-section h2 { color: #0D47A1; font-family: 'Fredoka One', cursive; margin-bottom: 20px; }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .admission-card {
            background: #f5f7fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
        }
        
        .admission-card.contacted { border-left-color: #FFC107; }
        .admission-card.enrolled { border-left-color: #4CAF50; }
        .admission-card.rejected { border-left-color: #E91E63; }
        
        .admission-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .admission-header h3 { color: #0D47A1; }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .status-new { background: #667eea; color: white; }
        .status-contacted { background: #FFC107; color: #0D47A1; }
        .status-enrolled { background: #4CAF50; color: white; }
        .status-rejected { background: #E91E63; color: white; }
        
        .admission-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        
        .detail-item { display: flex; align-items: center; gap: 10px; }
        .detail-item i { color: #667eea; width: 20px; }
        
        .admission-actions { margin-top: 15px; display: flex; gap: 10px; }
        
        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        
        .btn-contact { background: #FFC107; color: #0D47A1; }
        .btn-enroll { background: #4CAF50; color: white; }
        .btn-reject { background: #E91E63; color: white; }
        .btn-delete { background: #f44336; color: white; }
        
        .no-data { text-align: center; padding: 50px; color: #546E7A; }
        
        .loading { text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Little Star Public School</h1>
            <p>Admission Management System</p>
        </header>
        
        <div class="stats-row">
            <div class="stat-card">
                <h3 id="totalCount">0</h3>
                <p>Total Applications</p>
            </div>
            <div class="stat-card">
                <h3 id="newCount">0</h3>
                <p>New</p>
            </div>
            <div class="stat-card">
                <h3 id="contactedCount">0</h3>
                <p>Contacted</p>
            </div>
            <div class="stat-card">
                <h3 id="enrolledCount">0</h3>
                <p>Enrolled</p>
            </div>
        </div>
        
        <div class="admissions-section">
            <h2>📋 Recent Admissions</h2>
            <button class="refresh-btn" onclick="loadAdmissions()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <div id="admissionsList">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadAdmissions() {
            const list = document.getElementById('admissionsList');
            list.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
            
            try {
                const response = await fetch('/api/admissions');
                const result = await response.json();
                
                if (result.success) {
                    updateStats(result.admissions);
                    displayAdmissions(result.admissions);
                } else {
                    list.innerHTML = '<div class="no-data">Error loading admissions</div>';
                }
            } catch (error) {
                list.innerHTML = '<div class="no-data">Error: ' + error.message + '</div>';
            }
        }
        
        function updateStats(admissions) {
            document.getElementById('totalCount').textContent = admissions.length;
            document.getElementById('newCount').textContent = admissions.filter(a => a.status === 'new').length;
            document.getElementById('contactedCount').textContent = admissions.filter(a => a.status === 'contacted').length;
            document.getElementById('enrolledCount').textContent = admissions.filter(a => a.status === 'enrolled').length;
        }
        
        function displayAdmissions(admissions) {
            const list = document.getElementById('admissionsList');
            
            if (admissions.length === 0) {
                list.innerHTML = '<div class="no-data">No admissions yet!</div>';
                return;
            }
            
            list.innerHTML = admissions.map(admission => `
                <div class="admission-card ${admission.status}">
                    <div class="admission-header">
                        <h3>${admission.childName}</h3>
                        <span class="status-badge status-${admission.status}">${admission.status}</span>
                    </div>
                    <div class="admission-details">
                        <div class="detail-item">
                            <i class="fas fa-user"></i>
                            <span><strong>Parent:</strong> ${admission.parentName}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-phone"></i>
                            <span><strong>Phone:</strong> ${admission.phone}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-envelope"></i>
                            <span><strong>Email:</strong> ${admission.email || 'N/A'}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-graduation-cap"></i>
                            <span><strong>Class:</strong> ${admission.classJoin}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-calendar"></i>
                            <span><strong>Date:</strong> ${new Date(admission.date).toLocaleDateString()}</span>
                        </div>
                    </div>
                    ${admission.message ? `<div class="detail-item" style="margin-top:10px"><i class="fas fa-comment"></i><span><strong>Message:</strong> ${admission.message}</span></div>` : ''}
                    <div class="admission-actions">
                        <button class="action-btn btn-contact" onclick="updateStatus(${admission.id}, 'contacted')">
                            <i class="fas fa-phone"></i> Mark Contacted
                        </button>
                        <button class="action-btn btn-enroll" onclick="updateStatus(${admission.id}, 'enrolled')">
                            <i class="fas fa-check"></i> Enrolled
                        </button>
                        <button class="action-btn btn-reject" onclick="updateStatus(${admission.id}, 'rejected')">
                            <i class="fas fa-times"></i> Reject
                        </button>
                        <button class="action-btn btn-delete" onclick="deleteAdmission(${admission.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        async function updateStatus(id, status) {
            try {
                const response = await fetch(`/api/admission/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                const result = await response.json();
                if (result.success) {
                    loadAdmissions();
                } else {
                    alert('Error updating status');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function deleteAdmission(id) {
            if (!confirm('Are you sure you want to delete this admission?')) return;
            
            try {
                const response = await fetch(`/api/admission/${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                if (result.success) {
                    loadAdmissions();
                } else {
                    alert('Error deleting admission');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        // Load on page load
        loadAdmissions();
    </script>
</body>
</html>
